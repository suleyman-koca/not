<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Not Hesaplama</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; color: #333; }
        .section-title { font-size: 14px; color: #007BFF; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 20px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        #sonucAlani { margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; border-left: 5px solid #007BFF; }
        #sonucAlani p { margin: 8px 0; font-size: 15px; }
        .durum { font-weight: bold; font-size: 18px; margin-top: 15px !important; color: #d9534f; }
        .gecer { color: #5cb85c; }
        
        /* Geliştirilmiş İmza CSS'i */
        .footer-imza { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            margin-top: 30px; 
            padding-top: 15px; 
            border-top: 1px dashed #ddd; 
            font-size: 14px; 
            color: #777; 
        }
        .x-link {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #1DA1F2; /* X/Twitter Mavi Rengi (Dilersen #000 yaparak siyah da kullanabilirsin) */
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .x-link:hover {
            opacity: 0.7;
        }
        .x-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Not Hesaplama Sistemi</h2>
    
    <div class="section-title">Yazılı Notları</div>
    <div class="form-group">
        <label>1. Yazılı Notu:</label>
        <input type="number" id="yazili1" placeholder="Örn: 70">
    </div>
    <div class="form-group">
        <label>2. Yazılı Notu:</label>
        <input type="number" id="yazili2" placeholder="Örn: 80">
    </div>
    
    <div class="section-title">Performans (+) Verileri</div>
    <div class="form-group">
        <label>Öğrencinin Aldığı Performans (+):</label>
        <input type="number" id="perfArtisi" placeholder="Örn: 15">
    </div>
    <div class="form-group">
        <label>Sınıfta En Fazla Performans (+):</label>
        <input type="number" id="perfMax" placeholder="Örn: 25">
    </div>
    <div class="form-group">
        <label>Sınıfta En Az Performans (+):</label>
        <input type="number" id="perfMin" placeholder="Örn: -5">
    </div>

    <div class="section-title">Ödev (+) Verileri</div>
    <div class="form-group">
        <label>Öğrencinin Aldığı Ödev (+):</label>
        <input type="number" id="odevArtisi" placeholder="Örn: 10">
    </div>
    <div class="form-group">
        <label>Sınıfta En Fazla Ödev (+):</label>
        <input type="number" id="odevMax" placeholder="Örn: 20">
    </div>
    <div class="form-group">
        <label>Sınıfta En Az Ödev (+):</label>
        <input type="number" id="odevMin" placeholder="Örn: 0">
    </div>

    <button onclick="notHesapla()">Hesapla</button>

    <div id="sonucAlani">
        <p><strong>1. Yazılı:</strong> <span id="s_y1"></span></p>
        <p><strong>2. Yazılı:</strong> <span id="s_y2"></span></p>
        <p><strong>Yazılı Ortalaması:</strong> <span id="s_yOrt"></span></p>
        <p><strong>1. Performans Notu:</strong> <span id="s_p1"></span></p>
        <p><strong>2. Performans Notu:</strong> <span id="s_p2"></span></p>
        <p><strong>Karne Notu:</strong> <span id="s_karne"></span></p>
        <p class="durum" id="s_durum"></p>
    </div>
