<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Not Hesaplama</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; color: #333; }
        .section-title { font-size: 14px; color: #007BFF; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 20px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        #sonucAlani { margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; border-left: 5px solid #007BFF; }
        #sonucAlani p { margin: 8px 0; font-size: 15px; }
        .durum { font-weight: bold; font-size: 18px; margin-top: 15px !important; color: #d9534f; }
        .gecer { color: #5cb85c; }
        
        /* Geliştirilmiş ve Düzeltilmiş İmza CSS'i */
        .footer-imza { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; /* Yazı ile link arasındaki boşluk */
            margin-top: 30px; 
            padding-top: 15px; 
            border-top: 1px dashed #ddd; 
            font-size: 14px; 
            color: #444; 
        }
        .footer-imza strong {
            color: #222;
        }
        .x-link {
            display: flex;
            align-items: center;
            gap: 5px; /* İkon ile isim arasındaki boşluk */
            color: #000; /* X'in kendi orijinal siyah rengi */
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .x-link:hover {
            opacity: 0.6;
        }
        .x-icon {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Not Hesaplama Sistemi</h2>
    
    <div class="section-title">Yazılı Notları</div>
    <div class="form-group">
        <label>1. Yazılı Notu:</label>
        <input type="number" id="yazili1" placeholder="Örn: 70">
    </div>
    <div class="form-group">
        <label>2. Yazılı Notu:</label>
        <input type="number" id="yazili2" placeholder="Örn: 80">
    </div>
    
    <div class="section-title">Performans (+) Verileri</div>
    <div class="form-group">
        <label>Öğrencinin Aldığı Performans (+):</label>
        <input type="number" id="perfArtisi" placeholder="Örn: 15">
    </div>
    <div class="form-group">
        <label>Sınıfta En Fazla Performans (+):</label>
        <input type="number" id="perfMax" placeholder="Örn: 25">
    </div>
    <div class="form-group">
        <label>Sınıfta En Az Performans (+):</label>
        <input type="number" id="perfMin" placeholder="Örn: -5">
    </div>

    <div class="section-title">Ödev (+) Verileri</div>
    <div class="form-group">
        <label>Öğrencinin Aldığı Ödev (+):</label>
        <input type="number" id="odevArtisi" placeholder="Örn: 10">
    </div>
    <div class="form-group">
        <label>Sınıfta En Fazla Ödev (+):</label>
        <input type="number" id="odevMax" placeholder="Örn: 20">
    </div>
    <div class="form-group">
        <label>Sınıfta En Az Ödev (+):</label>
        <input type="number" id="odevMin" placeholder="Örn: 0">
    </div>

    <button onclick="notHesapla()">Hesapla</button>

    <div id="sonucAlani">
        <p><strong>1. Yazılı:</strong> <span id="s_y1"></span></p>
        <p><strong>2. Yazılı:</strong> <span id="s_y2"></span></p>
        <p><strong>Yazılı Ortalaması:</strong> <span id="s_yOrt"></span></p>
        <p><strong>1. Performans Notu:</strong> <span id="s_p1"></span></p>
        <p><strong>2. Performans Notu:</strong> <span id="s_p2"></span></p>
        <p><strong>Karne Notu:</strong> <span id="s_karne"></span></p>
        <p class="durum" id="s_durum"></p>
    </div>

    <div class="footer-imza">
        <strong>Geliştirici:</strong>
        <a href="https://x.com/suleymankoca" target="_blank" class="x-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="x-icon">
                <path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.6 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"/>
            </svg>
            @SuleymanKoca
        </a>
    </div>
</div>

<script>
    // AYARLAR: Etki oranları
    const ODEV_ETKISI = 0.25;      
    const PERFORMANS_ETKISI = 0.75; 

    // Excel'deki asıl formülü uygulayan ve "Ham Not" döndüren fonksiyon
    function excelFormuluUygula(ogrenciArti, maxArti, minArti, yaziliOrt) {
        if (maxArti === minArti) return 100; // Bölme hatasını (NaN) önlemek için
        return yaziliOrt + ((100 - yaziliOrt) / (maxArti - minArti)) * (ogrenciArti - minArti);
    }

    // Bulunan değeri 5'in katlarına yukarı yuvarlayan fonksiyon
    function yukariBesligeYuvarla(hamNot) {
        let yuvarlanmisNot = Math.ceil(hamNot / 5) * 5;
        return yuvarlanmisNot > 100 ? 100 : yuvarlanmisNot; // 100'ü geçmesin
    }

    function notHesapla() {
        // 1. Verileri Al
        let y1 = parseFloat(document.getElementById('yazili1').value) || 0;
        let y2 = parseFloat(document.getElementById('yazili2').value) || 0;
        
        let perfArtisi = parseFloat(document.getElementById('perfArtisi').value) || 0;
        let perfMax = parseFloat(document.getElementById('perfMax').value) || 0;
        let perfMin = parseFloat(document.getElementById('perfMin').value) || 0;

        let odevArtisi = parseFloat(document.getElementById('odevArtisi').value) || 0;
        let odevMax = parseFloat(document.getElementById('odevMax').value) || 0;
        let odevMin = parseFloat(document.getElementById('odevMin').value) || 0;

        // 2. Yazılı Ortalaması
        let yaziliOrt = (y1 + y2) / 2;

        // 3. 1. Performans Notu Hesabı (Sadece Performans + değerleri ile)
        let p1Ham = excelFormuluUygula(perfArtisi, perfMax, perfMin, yaziliOrt);
        let p1Yuvarlanmis = yukariBesligeYuvarla(p1Ham);

        // 4. 2. Performans Notu Hesabı (Ara değerler ve oranlar ile)
        let odevHam = excelFormuluUygula(odevArtisi, odevMax, odevMin, yaziliOrt);
        
        // Ödevin %25'i + 1. Performansın %75'i
        let p2Ham = (odevHam * ODEV_ETKISI) + (p1Ham * PERFORMANS_ETKISI);
        let p2Yuvarlanmis = yukariBesligeYuvarla(p2Ham);

        // 5. Karne Notu (4 Notun Ortalaması)
        let karneNotu = (y1 + y2 + p1Yuvarlanmis + p2Yuvarlanmis) / 4;

        // 6. Durum Değerlendirmesi
        let durumMetni = "";
        let durumRengi = "durum"; 

        if (karneNotu < 50) {
            durumMetni = "Geçmez";
        } else if (karneNotu >= 50 && karneNotu < 60) {
            durumMetni = "Geçer";
            durumRengi += " gecer";
        } else if (karneNotu >= 60 && karneNotu < 70) {
            durumMetni = "Orta";
            durumRengi += " gecer";
        } else if (karneNotu >= 70 && karneNotu < 85) {
            durumMetni = "İyi";
            durumRengi += " gecer";
        } else if (karneNotu >= 85) {
            durumMetni = "Pekiyi";
            durumRengi += " gecer";
        }

        // 7. Sonuçları Ekrana Yazdır
        document.getElementById('s_y1').innerText = y1;
        document.getElementById('s_y2').innerText = y2;
        document.getElementById('s_yOrt').innerText = yaziliOrt.toFixed(2);
        document.getElementById('s_p1').innerText = p1Yuvarlanmis;
        document.getElementById('s_p2').innerText = p2Yuvarlanmis;
        document.getElementById('s_karne').innerText = karneNotu.toFixed(2);
        
        let durumElementi = document.getElementById('s_durum');
        durumElementi.innerText = "Durum: " + durumMetni;
        durumElementi.className = durumRengi;

        document.getElementById('sonucAlani').style.display = 'block';
    }
</script>

</body>
</html>
