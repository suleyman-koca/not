<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Not Hesaplama</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        #sonucAlani { margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; border-left: 5px solid #007BFF; }
        #sonucAlani p { margin: 8px 0; font-size: 15px; }
        .durum { font-weight: bold; font-size: 18px; margin-top: 15px !important; color: #d9534f; }
        .gecer { color: #5cb85c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Not Hesaplama Sistemi</h2>
    
    <div class="form-group">
        <label>1. Yazılı Notu:</label>
        <input type="number" id="yazili1" placeholder="Örn: 70">
    </div>
    
    <div class="form-group">
        <label>2. Yazılı Notu:</label>
        <input type="number" id="yazili2" placeholder="Örn: 80">
    </div>
    
    <div class="form-group">
        <label>Alınan Performans (+):</label>
        <input type="number" id="perfArtisi" placeholder="Örn: 15">
    </div>

    <div class="form-group">
        <label>Alınan Ödev (+):</label>
        <input type="number" id="odevArtisi" placeholder="Örn: 10">
    </div>

    <div class="form-group">
        <label>Sınıfta En Fazla Alınan (+):</label>
        <input type="number" id="enFazlaArti" placeholder="Örn: 25">
    </div>

    <div class="form-group">
        <label>Sınıfta En Az Alınan (+):</label>
        <input type="number" id="enAzArti" placeholder="Örn: -5">
    </div>

    <button onclick="notHesapla()">Hesapla</button>

    <div id="sonucAlani">
        <p><strong>1. Yazılı:</strong> <span id="s_y1"></span></p>
        <p><strong>2. Yazılı:</strong> <span id="s_y2"></span></p>
        <p><strong>Yazılı Ortalaması:</strong> <span id="s_yOrt"></span></p>
        <p><strong>1. Performans Notu:</strong> <span id="s_p1"></span></p>
        <p><strong>2. Performans Notu:</strong> <span id="s_p2"></span></p>
        <p><strong>Karne Notu:</strong> <span id="s_karne"></span></p>
        <p class="durum" id="s_durum"></p>
    </div>
</div>

<script>
    // AYARLAR: Etki oranlarını buradan kolayca değiştirebilirsin
    const ODEV_ETKISI = 0.25;      // %25 Ödev etkisi
    const PERFORMANS_ETKISI = 0.75; // %75 Performans etkisi

    // Formülü uygulayıp 5'in katlarına yukarı yuvarlayan fonksiyon
    function hesaplaVeYuvarla(ogrenciArti, maxArti, minArti, yaziliOrt) {
        // Eğer sınıfın en iyisi ile en kötüsü aynıysa (bölme hatasını önlemek için)
        if (maxArti === minArti) return 100; 

        // Excel formülünün JavaScript hali
        let hamNot = yaziliOrt + ((100 - yaziliOrt) / (maxArti - minArti)) * (ogrenciArti - minArti);
        
        // Yukarı 5'liğe yuvarlama işlemi
        let yuvarlanmisNot = Math.ceil(hamNot / 5) * 5;

        // Not 100'ü geçemez
        if (yuvarlanmisNot > 100) yuvarlanmisNot = 100;
        
        return yuvarlanmisNot;
    }

    function notHesapla() {
        // 1. Kullanıcıdan verileri al
        let y1 = parseFloat(document.getElementById('yazili1').value) || 0;
        let y2 = parseFloat(document.getElementById('yazili2').value) || 0;
        let perfArtisi = parseFloat(document.getElementById('perfArtisi').value) || 0;
        let odevArtisi = parseFloat(document.getElementById('odevArtisi').value) || 0;
        let maxArti = parseFloat(document.getElementById('enFazlaArti').value) || 0;
        let minArti = parseFloat(document.getElementById('enAzArti').value) || 0;

        // 2. Yazılı Ortalaması
        let yaziliOrt = (y1 + y2) / 2;

        // 3. 1. Performans Notu (Sadece Performans + puanı ile)
        let p1 = hesaplaVeYuvarla(perfArtisi, maxArti, minArti, yaziliOrt);

        // 4. 2. Performans Notu (Ödev ve Performans + ağırlıklı)
        let agirlikliArti = (odevArtisi * ODEV_ETKISI) + (perfArtisi * PERFORMANS_ETKISI);
        let p2 = hesaplaVeYuvarla(agirlikliArti, maxArti, minArti, yaziliOrt);

        // 5. Karne Notu (4 Notun Ortalaması)
        let karneNotu = (y1 + y2 + p1 + p2) / 4;

        // 6. Durum Değerlendirmesi
        let durumMetni = "";
        let durumRengi = "durum"; // Kırmızı (Geçmez varsayılan)

        if (karneNotu < 50) {
            durumMetni = "Geçmez";
        } else if (karneNotu >= 50 && karneNotu < 60) {
            durumMetni = "Geçer";
            durumRengi += " gecer";
        } else if (karneNotu >= 60 && karneNotu < 70) {
            durumMetni = "Orta";
            durumRengi += " gecer";
        } else if (karneNotu >= 70 && karneNotu < 85) {
            durumMetni = "İyi";
            durumRengi += " gecer";
        } else if (karneNotu >= 85) {
            durumMetni = "Pekiyi";
            durumRengi += " gecer";
        }

        // 7. Sonuçları Ekrana Yazdır
        document.getElementById('s_y1').innerText = y1;
        document.getElementById('s_y2').innerText = y2;
        document.getElementById('s_yOrt').innerText = yaziliOrt.toFixed(2);
        document.getElementById('s_p1').innerText = p1;
        document.getElementById('s_p2').innerText = p2;
        document.getElementById('s_karne').innerText = karneNotu.toFixed(2);
        
        let durumElementi = document.getElementById('s_durum');
        durumElementi.innerText = "Durum: " + durumMetni;
        durumElementi.className = durumRengi;

        // Sonuç alanını görünür yap
        document.getElementById('sonucAlani').style.display = 'block';
    }
</script>

</body>
</html>
